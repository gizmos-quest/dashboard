name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Kubero
        run: |
          # Login to Kubero
          TOKEN=$(curl -s -X POST "${{ secrets.KUBERO_URL }}/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"username":"${{ secrets.KUBERO_USER }}","password":"${{ secrets.KUBERO_PASS }}"}' | jq -r '.access_token')

          # Reboot app to pull new image
          curl -s -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            "${{ secrets.KUBERO_URL }}/api/apps/dashboard/production/dashboard/reboot" \
            -d '{"name":"dashboard","pipeline":"dashboard","phase":"production"}'
